replicaCount: 1

image:
  repository: renci/graph-metadata-dashboard
  tag: "v1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8050

env:
  KGX_STORAGE_BASE_URL: "https://kgx-storage.ci.transltr.io/releases"
  METADATA_CACHE_BACKEND: "diskcache"
  METADATA_CACHE_DIR: "/tmp/graph-metadata-dashboard-cache"
  METADATA_CACHE_TTL_SECONDS: "3600"
  REQUESTS_TIMEOUT_SECONDS: "20"
  PORT: "8050"
  DASH_DEBUG: "false"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
    ephemeral-storage: 1Gi
  limits:
    cpu: "2"
    memory: 6Gi
    ephemeral-storage: 6Gi

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: kg-dashboard.apps.renci.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
   - secretName: kg-dashboard.apps.renci.org-tls
     hosts:
       - kg-dashboard.apps.renci.org

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
